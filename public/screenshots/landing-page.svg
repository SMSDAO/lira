<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heroText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d4edd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d4edd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#heroBg)"/>

  <!-- Subtle background circles/orbs -->
  <circle cx="200" cy="300" r="200" fill="#9d4edd" opacity="0.07"/>
  <circle cx="1100" cy="400" r="250" fill="#00d4ff" opacity="0.05"/>
  <circle cx="640" cy="600" r="150" fill="#ff006e" opacity="0.04"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="64" fill="#0a0e1a" opacity="0.95"/>
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Logo -->
  <rect x="40" y="14" width="36" height="36" rx="8" fill="url(#logoBg)"/>
  <text x="58" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#050810" text-anchor="middle">L</text>
  <text x="86" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff">LIRA</text>

  <!-- Nav links -->
  <text x="460" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Dashboard</text>
  <text x="580" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Launch Token</text>
  <text x="710" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Agents</text>
  <text x="790" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Admin</text>

  <!-- Connect Button -->
  <rect x="1110" y="16" width="140" height="32" rx="16" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <text x="1180" y="36" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">Connect Wallet</text>

  <!-- Hero Section -->
  <rect x="0" y="64" width="1280" height="430" fill="#050810"/>

  <!-- Hero heading -->
  <text x="640" y="200" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="url(#heroText)" text-anchor="middle" filter="url(#softGlow)">Quantum-Powered</text>
  <text x="640" y="278" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="url(#heroText)" text-anchor="middle" filter="url(#softGlow)">Token Launches</text>

  <!-- Hero subtext -->
  <text x="640" y="336" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Launch tokens with AI agents, quantum oracle intelligence, and parallel</text>
  <text x="640" y="360" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">execution on BASE and Monad</text>

  <!-- CTA Buttons -->
  <rect x="440" y="396" width="180" height="48" rx="8" fill="url(#btnBg)"/>
  <text x="530" y="426" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#050810" text-anchor="middle">Launch Your Token</text>

  <rect x="642" y="396" width="180" height="48" rx="8" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <text x="732" y="426" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#00d4ff" text-anchor="middle">Explore Dashboard</text>

  <!-- Features Section -->
  <rect x="0" y="494" width="1280" height="306" fill="#0a0e1a"/>
  <text x="640" y="540" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#00d4ff" text-anchor="middle">Features</text>

  <!-- Feature cards -->
  <!-- Card 1 -->
  <rect x="40" y="560" width="190" height="120" rx="10" fill="#050810" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="65" y="592" font-family="Arial, sans-serif" font-size="26">🚀</text>
  <text x="65" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">Auto Token Launch</text>
  <text x="65" y="642" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Launch tokens instantly with</text>
  <text x="65" y="658" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">automatic liquidity</text>

  <!-- Card 2 -->
  <rect x="250" y="560" width="190" height="120" rx="10" fill="#050810" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="275" y="592" font-family="Arial, sans-serif" font-size="26">⚛️</text>
  <text x="275" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">Quantum Oracle</text>
  <text x="275" y="642" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Q# powered quantum brain</text>
  <text x="275" y="658" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">oracle for market intelligence</text>

  <!-- Card 3 -->
  <rect x="460" y="560" width="190" height="120" rx="10" fill="#050810" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="485" y="592" font-family="Arial, sans-serif" font-size="26">🤖</text>
  <text x="485" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">Parallel Agents</text>
  <text x="485" y="642" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Deploy AI agents for model</text>
  <text x="485" y="658" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">building simultaneously</text>

  <!-- Card 4 -->
  <rect x="670" y="560" width="190" height="120" rx="10" fill="#050810" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="695" y="592" font-family="Arial, sans-serif" font-size="26">💰</text>
  <text x="695" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">Smart Wallets</text>
  <text x="695" y="642" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Integrated wallet with social</text>
  <text x="695" y="658" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">features and timeline</text>

  <!-- Card 5 -->
  <rect x="880" y="560" width="190" height="120" rx="10" fill="#050810" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="905" y="592" font-family="Arial, sans-serif" font-size="26">⚙️</text>
  <text x="905" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">Admin Control</text>
  <text x="905" y="642" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Full admin dashboard for</text>
  <text x="905" y="658" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">fees, settings and billing</text>

  <!-- Card 6 -->
  <rect x="1090" y="560" width="150" height="120" rx="10" fill="#050810" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="1115" y="592" font-family="Arial, sans-serif" font-size="26">🔗</text>
  <text x="1115" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">Multi-Chain</text>
  <text x="1115" y="642" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Production ready on</text>
  <text x="1115" y="658" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">BASE and Monad</text>

  <!-- Footer -->
  <rect x="0" y="770" width="1280" height="30" fill="#0a0e1a"/>
  <line x1="0" y1="770" x2="1280" y2="770" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <text x="640" y="789" font-family="Arial, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">© 2026 Lira Protocol. All rights reserved.</text>
</svg>
