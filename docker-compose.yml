# Lira Protocol — Production Beta Docker Compose
#
# Services
# ─────────────────────────────────────────────────────────────────────────────
# core-engine-api   Rust HTTP API wrapping the Lira DSL compiler
# web               Next.js 15 front-end (admin hub)
# mobile-backend    Express.js API for the React Native mobile app
# postgres          PostgreSQL 16 persistent storage
# redis             Redis 7 for WebSocket pub/sub and caching
# indexer           Lira blockchain event indexer (Node.js)
#
# Usage
# ─────────────────────────────────────────────────────────────────────────────
# cp .env.example .env          # fill in your secrets
# docker compose up --build     # first run (builds images)
# docker compose up -d          # subsequent runs (detached)
# docker compose logs -f        # tail all service logs
# docker compose down -v        # stop and remove volumes

version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────────
networks:
  lira-internal:
    driver: bridge

# ──────────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:

# ──────────────────────────────────────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lira
      POSTGRES_USER: ${POSTGRES_USER:-lira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lira-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lira} -d lira"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - lira-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core Engine API ─────────────────────────────────────────────────────────
  # Thin Actix-web HTTP wrapper around the Rust core engine.
  # POST /compile  { source: string, options: CompileOptions } → CompileResult
  core-engine-api:
    build:
      context: ./core-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - lira-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Web Front-end ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      core-engine-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lira}:${POSTGRES_PASSWORD:?err}@postgres:5432/lira
      NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-84532}
      NEXT_PUBLIC_CHAIN_NAME: ${NEXT_PUBLIC_CHAIN_NAME:-"Base Sepolia"}
      NEXT_PUBLIC_WALLET_CONNECT_ID: ${NEXT_PUBLIC_WALLET_CONNECT_ID:-}
      NEXT_PUBLIC_LIRA_TOKEN: ${NEXT_PUBLIC_LIRA_TOKEN:-}
      NEXT_PUBLIC_FACTORY: ${NEXT_PUBLIC_FACTORY:-}
      NEXT_PUBLIC_WS_URL: ws://mobile-backend:4001/ws
      CORE_ENGINE_URL: http://core-engine-api:4000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    networks:
      - lira-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Mobile Backend ──────────────────────────────────────────────────────────
  # Express.js API + WebSocket server consumed by the React Native app.
  # - REST:  /api/wallet, /api/contracts, /api/notifications
  # - WS:    /ws  (real-time contract events + margin calls)
  mobile-backend:
    build:
      context: .
      dockerfile: Dockerfile.mobile-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-lira}:${POSTGRES_PASSWORD:?err}@postgres:5432/lira
      REDIS_URL: redis://redis:6379
      CORE_ENGINE_URL: http://core-engine-api:4000
      JWT_SECRET: ${JWT_SECRET:?err}
    ports:
      - "4001:4001"
    networks:
      - lira-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Blockchain Indexer ──────────────────────────────────────────────────────
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lira}:${POSTGRES_PASSWORD:?err}@postgres:5432/lira
      BASE_RPC_URL: ${BASE_RPC_URL:?err}
      BASE_SEPOLIA_RPC_URL: ${BASE_SEPOLIA_RPC_URL:-https://sepolia.base.org}
      LIRA_TOKEN_ADDRESS: ${NEXT_PUBLIC_LIRA_TOKEN:-}
      REGISTRY_ADDRESS: ${NEXT_PUBLIC_FACTORY:-}
    networks:
      - lira-internal
